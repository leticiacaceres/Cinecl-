.filmes{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;margin-top:30px}

.filme img{width:100%;border-radius:8px}
.filme button{background:#e50914;color:white;border:none;padding:12px;width:100%;border-radius:8px;margin-top:10px;font-weight:bold;cursor:pointer}
</style>
