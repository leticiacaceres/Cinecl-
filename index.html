<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cineclã 🎬</title>
    <style>
        body { background: #111; color: white; font-family: Arial; padding: 20px; }
        h1 { color: #e50914; text-align: center; }
        .filmes { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
        .filme { background: #222; padding: 15px; border-radius: 10px; text-align: center; }
        .filme img { width: 100%; border-radius: 8px; }
        .filme button { background: #e50914; color: white; border: none; padding: 10px; width: 100%; border-radius: 5px; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Cineclã 🎬</h1>
    <div class="filmes">
        <div class="filme">
            <img src="https://image.tmdb.org/t/p/w500/iuFNMS8U5cb6xfzi51Dbkovj7vM.jpg" alt="Barbie">
            <h3>Barbie</h3>
            <button>Assistir</button>
        </div>
        <div class="filme">
            <img src="https://image.tmdb.org/t/p/w500/8Vt6mWEReuy4zWQBqNZHvP7X5j.jpg" alt="Homem Aranha">
            <h3>Homem Aranha: Através do Aranhaverso</h3>
            <button>Assistir</button>
        </div>
        <div class="filme">
            <img src="https://image.tmdb.org/t/p/w500/8Gxv8gSFCU0XGDjQyQyUoY7JbX.jpg" alt="Oppenheimer">
            <h3>Oppenheimer</h3>
            <button>Assistir</button>
        </div>
        <!-- Pode copiar e colar mais filmes aqui -->
    </div>
</body>
</html>
