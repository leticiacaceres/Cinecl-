<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cineclã 🎬</title>
<style>
body{background:#0a0a0a;color:white;font-family:Arial;padding:20px;margin:0}
h1{color:#e50914;text-align:center;font-size:2.5rem;margin-bottom:30px}
.filmes{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px}
.filme{background:#1a1a1a;padding:15px;border-radius:12px;text-align:center;transition:0.3s}
.filme:hover{transform:scale(1.05)}
.filme img{width:100%;height:330px;object-fit:cover;border-radius:8px}
.filme h3{margin:10px 0;font-size:1.1rem}
.filme button{background:#e50914;color:white;border:none;padding:12px;width:100%;border-radius:8px;margin-top:10px;font-weight:bold;cursor:pointer}
.filme button:hover{background:#b20710}
</style>
</head>
<body>
<h1>Cineclã 🎬</h1>
<div class="filmes">

<div class="filme"><img src="https://upload.wikimedia.org/wikipedia/pt/9/9f/Barbie_filme_2023.jpg"><h3>Barbie</h3><button>Assistir</button></div>
<div class="filme"><img src="https://upload.wikimedia.org/wikipedia/pt/3/3e/Fast_X_poster.jpg"><h3>Velozes e Furiosos 10</h3><button>Assistir</button></div>
<div class="filme"><img src="https://upload.wikimedia.org/wikipedia/pt/8/8f/Oppenheimer_poster.jpg"><h3>Oppenheimer</h3><button>Assistir</button></div>
<div class="filme"><img src="https://upload.wikimedia.org/wikipedia/pt/9/9d/Spider-Man_Into_the_Spider-Verse_poster.jpg"><h3>Homem-Aranha</h3><button>Assistir</button></div>
<div class="filme"><img src="https://upload.wikimedia.org/wikipedia/pt/7/7f/Guardioes_da_Galaxia_Vol._3_poster.jpg"><h3>Guardiões da Galáxia 3</h3><button>Assistir</button></div>
<div class="filme"><img src="https://upload.wikimedia.org/wikipedia/pt/9/9e/John_Wick_Chapter_4_poster.jpg"><h3>John Wick 4</h3><button>Assistir</button></div>
<div class="filme"><img src="https://upload.wikimedia.org/wikipedia/pt/5/54/Avatar_The_Way_of_Water_poster.jpg"><h3>Avatar 2</h3><button>Assistir</button></div>
<div class="filme"><img src="https://upload.wikimedia.org/wikipedia/pt/b7/Elemental_poster.jpg"><h3>Elementos</h3><button>Assistir</button></div>
<div class="filme"><img src="https://upload.wikimedia.org/wikipedia/pt/4/4a/Mission_Impossible_Dead_Reckoning_Part_One_poster.jpg"><h3>Missão Impossível 7</h3><button>Assistir</button></div>
<div class="filme"><img src="https://upload.wikimedia.org/wikipedia/pt/5/54/The_Little_Mermaid_2023_poster.jpg"><h3>A Pequena Sereia</h3><button>Assistir</button></div>

</div>
</body>
</html>
