<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>CineCl - Catálogo de Filmes</title>
  <style>
    body {
      background: #141414;
      color: white;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
    }
    h1 {
      text-align: center;
      color: #E50914;
    }
    .catalogo {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }
    .filme {
      text-align: center;
    }
    .filme img {
      width: 100%;
      border-radius: 8px;
      transition: transform 0.3s;
    }
    .filme img:hover {
      transform: scale(1.05);
    }
    .filme p {
      margin: 8px 0;
      font-weight: bold;
    }
    .botao {
      background: #E50914;
      color: white;
      border: none;
      padding: 8px 15px;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
    }
    .botao:hover {
      background: #b20710;
    }
  </style>
</head>
<body>

  <h1>🎬 CineCl - Catálogo de Filmes</h1>

  <div class="catalogo">
    <div class="filme">
      <img src="barbie.jpg" alt="Barbie">
      <p>Barbie</p>
      <button class="botao">Assistir</button>
    </div>
    <div class="filme">
      <img src="homemaranha.jpg" alt="Homem Aranha">
      <p>Homem Aranha</p>
      <button class="botao">Assistir</button>
    </div>
    <div class="filme">
      <img src="oppenheimer.jpg" alt="Oppenheimer">
      <p>Oppenheimer</p>
      <button class="botao">Assistir</button>
    </div>
    <div class="filme">
      <img src="vingadores.jpg" alt="Vingadores">
      <p>Vingadores</p>
      <button class="botao">Assistir</button>
    </div>
    <div class="filme">
      <img src="coraline.jpg" alt="Coraline">
      <p>Coraline</p>
      <button class="botao">Assistir</button>
    </div>
    <div class="filme">
      <img src="deadpool.jpg" alt="Deadpool">
      <p>Deadpool</p>
      <button class="botao">Assistir</button>
    </div>
    <div class="filme">
      <img src="divertidamente.jpg" alt="Divertidamente">
      <p>Divertidamente</p>
      <button class="botao">Assistir</button>
    </div>
    <div class="filme">
      <img src="duna2.jpg" alt="Duna 2">
      <p>Duna 2</p>
      <button class="botao">Assistir</button>
    </div>
    <div class="filme">
      <img src="harrypotter.jpg" alt="Harry Potter">
      <p>Harry Potter</p>

    </div>
    <div class="filme">
      <img src="velozes.jpg" alt="Velozes e Furiosos">
      <p>Velozes e Furiosos</p>
      <button class="botao">Assistir</button>
    </div>
  </div>

</body>

</html>
